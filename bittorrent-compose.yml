---

secrets:
  bittorrent-user:
    file: ./secrets/bittorrent-user.secret
  bittorrent-password:
    file: ./secrets/bittorrent-password.secret

services:
  bittorrent:
    # See more: https://docs.linuxserver.io/images/docker-qbittorrent
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: bittorrent
    restart: always
    network_mode: "service:gluetun"
    env_file: ./env/bittorrent.env
    volumes:
      - ./bittorrent:/config
      - ./torrent:/media
    healthcheck:
      test: curl -f http://localhost:8088 || exit 1
      interval: 10s
      timeout: 3s
      start_period: 60s
    ports:
      - 8088:8088
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true

networks:
  default:
    name: media_network
    driver: bridge
    attachable: true