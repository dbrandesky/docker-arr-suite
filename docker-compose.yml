---

services:
  gluetun:
    # See more: https://github.com/qdm12/gluetun-wiki
    image: qmcgaw/gluetun:v3
    container_name: gluetun
    restart: always
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file: ./env/gluetun.env
    volumes:
      - ./gluetun:/gluetun
    ports:
      - "50000:50000/tcp"
      - "50000:50000/udp"
      - "8088:8088/tcp"
      - "8989:8989/tcp"
      - "7878:7878/tcp"
      - "9696:9696/tcp"
  gluetun-webui:
    image: scuzza/gluetun-webui:latest
    container_name: gluetun-webui
    ports:
      - 8079:3000
    environment:
      - GLUETUN_CONTROL_URL=http://gluetun:8000
      # Uncomment if Gluetun auth is enabled:
      #- GLUETUN_API_KEY=yourtoken
      #- GLUETUN_USER=username
      #- GLUETUN_PASSWORD=password
    networks:
      - default
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

include:
  - bittorrent-compose.yml
  - arr-compose.yml
#  - plex-compose.yml
#  - jellyfin-compose.yml

networks:
  default:
    name: media_network
    driver: bridge
    attachable: true